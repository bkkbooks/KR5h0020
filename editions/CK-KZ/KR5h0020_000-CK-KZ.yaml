已枯復榮已滅復生得生天上更稟大靈九天之劫返胎復嬰穢炁蕩滅身屍更生舉解冤釋結天尊侍職焚解冤符高功默念青華誥一遍默告救苦天尊紫皇上帝請爲亡魂解冤釋結三生四負冤家債主不爲留難玉訣青炁佈亡魂默咒神符告下解冤釋結永脫仇讐執對分別釁緣俱盡不生惡業出離寒庭罪根消滅亡靈得全身體是謂死而復生重整衣冠當悟來而不往不以凡間衣服為獻謹用符咒助化身章高登道岸舉金容玉相天尊侍職焚化衣符衆誦玉誥三遍高功默念綘章丹衣飄飄楚楚元始符命佩之輕舉唵嚩吱𠻗急急如南方丹天火帝君律侍職焚冠帶符高功玉文中天炁佈亡魂想衣冠楚楚伺候傳戒知磬舉常傳眞戒天尊道言戒者止也所以止人非心歸於正定故戒生定儒者亦謂知止而後有定但三洞諸經四部祕典說戒法種種不同惟無上靈寶九眞妙戒之旨天人共仰幽顯咸遵無上之上洞玄之玄萬神之靈一炁之寶妙貫三才戒制六情數定於陽故分於九脩而不偽故名爲眞凡世仰之以爲城廓幽顯資之以爲梯航靈魂受之以爲法藥然受戒之法靜默爲先持戒之功勤拳爲上法衆皈依同誠讚詠知磬舉按人各衆和恭敬夫三皈依者卽爲皈依道皈依經皈依師也是故衆魂皆當信禮第一皈依無上道寶舉道寶天尊第二皈依無上經寶舉經寶天尊第三皈依無上師寶舉師寶天尊皈依既畢戒法將傳幽壤豁若春回冤對渙然永釋罪花凋落功果圓成法衆䖍誠宣傳九戒第一戒者克勤忠於君王第二戒者敬讓孝養父母第三戒者不殺慈救衆生第四戒者不淫正身處物第五戒者不盜推義損已第六戒者不嗔兇怒淩人第七戒者不詐謟賊害善第八戒者不驕傲忽至眞第九戒者不二奉戒專一如上九戒乃九天帝君親口宣說佩奉者昇入九天輕慢者墮入九地今對亡靈依科傳受切宜諦聽終始勿忘所有功德符籙逐一宣示表白宣長生符生天籙妙戒靈文黃籙白簡既備敷於妙典當敬奉于靈文夫心之難制故九戒則可歸心於太虛形也未超以二符則可鍊形於上境亡靈直斯生生勿忘於戒言劫劫常存於符劵澄神物外塵緣永斷於多生受質陽間善果自臻于妙有流芳現在慶及無窮少頃發遣保舉登仙高功遣將某司謹召九天普度院守雄抱雌二大將本壇主將副將護道監壇四大元帥疾速部衛亡某徑詣朱陵火府南昌上宫上帝有敕風火無停舉寶華圓滿天尊汝等亡魂某騰光南極離暗北酆禮道禮經禮師一眞日皎鍊形鍊神鍊炁萬妄風清兹登寥廓之鄕徑達虛無之境永脫輪轉自在逍遙辭筵好去毋忘道恩知聲舉超淩仙界天尊高功召温帥發護送牒辭謝下座升送畢高功回壇都講舉存神燒香高功念香官使者左右龍虎君侍香諸靈官當令臣向來陞壇鍊度之所自然生金液丹碧芝英百靈衆眞交會在此香鼎爐前當願齋壇係薦衆魂無邊滯爽鍊形清淨見性圓明妙凝水火之眞生化人天之界玄恩廣彼善利均霑十方仙童玉女接侍蘭香傳臣向來所啓之誠速達徑詣無上至眞三寶祖師教主玄天紫皇上帝御前
