三生四負𡨚家債主不為畱難玉訣青炁佈亡魂黙咒神符告下觧𡨚釋結永脫仇讐執對分别釁縁俱盡不生𢙣業出離寒庭罪根消㓕亡靈得全身體是謂死而復生重整衣冠當悟来而不徃不以凢間衣服為獻謹用符咒𦔳化身章高登道㟁舉金容玉相天尊侍職焚化衣符衆誦王誥三遍高功黙念綘章丹衣飄飄楚楚元始符命佩之輕舉唵嚩吱𠻗急急如南方丹天火帝君律侍軄焚冠帶符高功玉文中天炁佈亡魂想衣冠楚楚伺候傳戒知磬舉常傳真戒天尊道言戒者止也所以止人非心歸扵正定故戒生定儒者亦謂知止而後有定但三洞諸經四部祕典說戒法種種不同惟無上靈寳九真妙戒之㫖天人共仰幽顯咸遵無上之上洞玄之玄萬神之靈一炁之寳妙貫三才戒制六情数定扵陽故分扵九脩而不偽故名為真凢世仰之以為城廓幽顯資之以為梯航靈魂受之以為法藥然受戒之法靜黙為先持戒之功勤拳為上法衆皈依同誠讃詠知磬舉按人各衆和恭敬夫二皈依者即為皈依道皈依經皈依師也是故衆魂皆當信禮第一皈依無上道寳舉道寳天尊第二皈依無上經寳舉經寳天尊第三皈依無上師寳舉師寳天尊皈依既畢戒法將傳幽壤豁若春囬𡨚對渙然永釋罪花凋落功果圓成法衆䖍誠宣傳九戒第一戒者克勤忠扵君王第二戒者敬讓孝飬父母第三戒者不殺慈救衆生第四戒者不滛正身處物第五戒者不盗推義損巳第六戒者不嗔𠒋怒沒人第七戒者不詐謟賊害善第八戒者不驕倣忽至真第九戒者不二奉戒專一如上九戒乃九天帝君親口宣說佩奉者昇入九天輕慢者堕入九地今對亡靈依科傳受切冝諦聴終始勿忘所有功徳符籙逐一宣示表白宣長生符生天籙妙戒靈文黃籙白簡既傋敷扵妙典當敬奉于靈文夫心之難制故九戒則可歸心扵太虚形也未超以二符則可鍊形扵上境亡靈直斯生生勿忘扵戒言刼刼常存扵符劵澄神物外塵縁永断扵多生受質陽間善果自臻于妙有流芳現在慶及無窮少頃發遣保舉登仙高功遣將某司謹召九天普度院守雄抱雌二大將本壇主將副將護道監壇四大元帥疾速部衛亡某徑詣朱陵火府南昌上宫上帝有敕風火無停舉寳華圓滿天尊汝等亡魂某騰光南極離暗北酆禮道禮經禮師一真日皎鍊形鍊神錬炁萬妄風清兹登寥廓之鄊徑達虚無之境永脱輪轉自在逍遥辭筵好去母忘道恩知聲舉超淩仙界天尊高功召温帥發護迭牒辭謝下座升送畢高功面壇都講舉存神燒香高功念香官使者左右龍虎君侍香諸靈官當令臣向来陞壇錬度之所自然生金液丹碧芝英百靈衆真交㑹在此香鼎爐前當願齋壇係薦衆魂無邊滯爽錬形淸净見性圓明妙凝水火之真生化人天之界玄恩廣彼善利均霑十方仙童玉女接侍蘭香傳臣向来所啓之誠速達徑詣無上至真三寳祖師教主玄天紫皇上帝御前紫皇錬度玄科終
