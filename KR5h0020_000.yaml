front:
  text: 紫皇錬度玄科𣾰一
  hash: sha256:579a1677de4077830f636d913df5a4b4e7f7eaa06f34c13e3d2030371df00a42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0020_HFL_000-001a, image: hfl/1064/1064-004.png}
body:
  text: 法事如儀侍職焚衛靈符都講舉各禮師存念如法請宣神咒五星列照煥明五方始皇護魂丹老衛形皓靈侍魄黑帝攝生中央黃帝總御萬真元皇告下幽夜開光罪消北府名列南宫金籙受籍玉字除殃朱陵受錬飛神太蒼三宫九府無極神鄉普受開度錬化天堂和與道合真都講舉侍職焚發爐符鳴法鼓二十四通高功念無上三天太𡨋天乙之氣紫皇天君召出臣身中三五功曹左右宫使者左右捧香驛龍騎吏侍香金童傳言散花玉女五帝直符直日香官使者各三十六人出出者嚴裝顯服冠𢃄垂纓關啓此間土地方域神真臣今正爾錬度升壇謹奏為入意其諸丹悃巳具奏聞臣今關願得北方五靈玄元之氣下降流入臣等身中令臣所啓之誠速逹徑詣無上至真三寶祖師教主玄天紫皇上帝御前都講舉請稱法位具位臣某誠惶誠恐稽首頓首上啓三清三境天尊昊天至尊玉皇上帝北極紫微伏魔大帝勾陳星宫天皇大帝承天效法后圡皇帝祗神霄真王長生大帝太乙尋聲救苦天尊十方靈寶天尊五方五老上帝九天生神上帝三十二天帝君東華木公元陽慈父西靈金真祖母元君日宫太陽帝君月府太隂皇君南斗鋾魂星君北斗鑄魄星君南極朱陵大帝南昌上宫司命司籙延夀益算錬化尊神廽骸起死監生大神主錬九華真人南昌上下朱陵火府真宰三元三品三官大帝靈寶五師真君西瑶主法沖天正一元君雷霆三省上相真君祖師教主玉虛師相紫皇玄天上帝祖師西河救苦薩真人清微靈寶紫庭酆都東嶽諸法傳𣲖師直童𥘉聚魂五府真君太陽火官太隂水官水府扶桑大帝南昌錬度司火沼水池使者玉眸錬質尊神金液錬形尊神丙丁朱雀神君黃華蕩形尊神石景水母元君壬癸玄武神君北都寒池使者化魂育魄尊神混元十二氣化生大將軍天醫大聖神虎何喬二元帥玄都茭龍驛吏火府賫簡童子九龍符命使者五方五靈童子醮筵真宰合座威靈恭望道慈洞回淵鑒以今奉為奉道追錬某伏為亡過某從傾逝莫測升沉仰惟太上之慈悲特啓玄科而濯鍊敬資玄造俾遂超升臣幸以宿緣冒行祕法真水真火罔明升降之功靈府靈源曷知燥濕之本匪慿道力何以鑄鋾輒攄懇切之誠敢瀆高真之聽伏望命五色浮雲之駕竪九光流景之旌金童玉女以雍雍將吏神兵而赫赫俯降法筵主盟錬度具有表文謹當宣讀宣紫皇表宣關畢高功作聲念臣聞日精月華廣照臨于下圡離南坎北共炎潤于生靈欲聚魂于形神須皈依于慈造伏望師慈特布真水真火降赴華池容臣鍊度專祈敕命告下日中炎光洞明太素真人火光童子鬱㼁將軍火鈴童子月中黃華石景流光夫人圓光童子結璘將軍雷門隂陽苟畢二雷神天篷門下四目老翁高刁北翁素梟三神長顱巨獸四大將軍陳唐宋薛四元神太玄斷㾪陳元帥離宫辟惡溫元帥追癆攝瘵開心符使伊祈大將地祗翊靈昭武溫元帥主水主火趙陶二元帥水池使者鄭大神火沼使者白大神守雄抱雌二大將無義斷恩王大神合形復體大神混元十二氣化生大神只今下降法壇助臣錬度務令受鍊亡魂業垢氷融𡨚尤燼滅承功托化隨果受生臣不漸愚昧叨冒行持全資真馭大賜正真道氣生氣梵氣三光真氣流入臣身容假慈光以成勝事所有真水真火臣謹懇請飛入明池以副效信臣干冒道威緬想玄恩潛垂昭報高功變神建火沼水池水火混合提魂訣存祕旨內朝座前念偈高功陛座左手捻香真念此香雲凝三素氣藹七靈丹谷流精離坎混金華之粹玄臺孕秀雌雄符玉笈之祥香焚爐內爇向爐中遙空供養元始法王洞真天寶奉祝正薦亡靈伏願千愆解釋萬罪消除北鬱升神白簡煥慈雲之渥南陵度命丹符融惠日之祥絶塜訟于門庭息災殃于嗣續高功左手捻香祝此香月窟分精天根育秀騰紫煙于碧落光煥陽靈飛彩霧于黃道祥開隂曜香焚爐內爇向爐中遙空供養太上玉宸洞玄靈寶奉祝係薦祖考先靈伏願各明正性頓悟本來慿金簡以出幽聞經悟道仗玉符而度品鍊質登真快樂無為逍遙自在高功在手捻香祝此香三極騰芳五靈委氣耀玉華于地蘂翠熖玲瓏施金景于天葩玄煌煒燁香焚爐內爇向爐中遙空供養道德高尊洞神神寶奉祝齋主某東華鍚慶南極增齡七葉聮芳萬里快雲鵬之運五枝挺秀九臯和鳳鶴之鳴敦詩禮于松蘿耀弦歌于桑梓知磬舉太乙救苦天尊高功直念伏以乾稱父坤稱母乃資生資始之元隂為魄陽為魂成有形有靈之命蓋萬物各存于性命惟一真不失于根源而况最靈者人自是秉彝之道一日是非善𢙣或罹果報或致升沉百年臭腐神竒難免輪廽難逃變化所以既沒之後飛爽浮幽寥未生之前故根離昔愛幽夜淪遐劫者對盡而大運必通乘晨希陽翹者靈存而正覺有想仰惟太上布大法橋以好生而施仁流真科而度世天一生水地二生火鋾錬玉粹而火降水升兌七化虎震三化龍守護金丹而龍吟虎嘯非水火交姤何以復其形非龍虎混合何以全其神用此生成謂之煉度紅鉛黑永以我之靈合彼之靈綘宫丹田以道之體合彼之體肝心脾肺腎之氣質載育載生金木水火圡之英華以兹以飬時也布日月星景建水火華池遵紫皇教法以奉行鋾魂鑄魄命南宫官吏而顯助濯質全形所冀在壇受度亡魂錬胎返本𥘉再稟五行之秀斬根斷死戶重為萬物之靈克符齋主之虔誠益廣紫皇之教法共揚聖號恭假恩光知磬舉度人無量天尊高功直念宣告亡魂地水火風假合成人之形癢痾疾痛縈纒為心之恙深慮陽間所患其在隂境亦然今者雖寂色身未除𢙣相先當去病乃可合真某司謹召天醫使者治病功曹嘗藥靈童針砭神吏六職治官諸部功曹準紫皇玄天上帝符命先為亡魂攝召生氣醫治在身生前一切疾病解釋宿業一切苦根蕩除血穢整具形神符令自性靈明克膺鍊化侍職焚天醫符玉清元始尊敕下天醫神完全枯朽質普濟度天人高功取五方氣布壇上水火混合之所太上慈悲符命頒行生者能全死者能完形神俱妙上朝玉堂流通五氣落滅𢙣根紅杏佐左農癱攣者伸磨針佐右兌瘓㾱者平襪臘下下離跛痾起行墨墨上上坎耳目聰明靈寶中中玉身強體輕青帝護魂卯肝木長榮赤帝飬氣午心火光亨白帝侍魄酉肺金生成黑帝通血子腎水澄清黃帝中主中脾圡安寧𣑽氣彌羅自然成真回尸起死白骨成人濟度垂死絶而得生九和十合變化上清高功又念四生六道十類有情萬死所苦一切成章天光一接符命得昌侍職焚血湖符圊樓符衆念太上丈人升度南宫三宫變化保命自然日宫帝君刋照下圡月宫皇君蕩滌血湖元皇下降灌溉群生對司侍宸罪滅三途洪流蕩穢洗濯𡨋津元陽玉曆積善建功三界所舉骨像合仙善功徹天幽夜開明陽九到陽隂六召隂隂陽交合敕斷死戶侍職𣑽分胎符衆念三清至化立像兩儀烹煉魂識玄應神機周全經絡百骸四肢五臟俱備上升紫微侍職𣑽出胎符衆念上帝敕命下降幽扃燒蕩穢濁速得生成侍職𣓕蕩胎符衆念玄靈太微精錬夷夷亡魂得度洞達無為上天垂象制錬亡魂十類孤爽咸得通明仙化成人三宫悉明九竅齊并南昌上生侍職𣑽淨尸符衆念五行之氣周流三光之氣飛浮靈漿下灌玉液洞幽魂神澄正皈上天會合萬神玉京逰天澄氣清五色高明日月吐華灌鍊身形神精內灌香湯鍊精光景洞耀煥映上清氣不受塵五臟納靈罪滅三途禍消九𡨋𢙣根斷絶福慶自生今日大願一切告盟身受開度升入帝鄉急急如律令元始符命披度亡靈血尸臭穢凶𢙣潛寧七液得注五臟化生常持神咒元亨利貞急急如元始上帝律令高功取五方氣三光氣布亡魂默念真中有神長生大君無英公子白元尊神太乙司命桃康合延執符把籙保命生根上逰丄清出入華八𡨋之內細微之中下鎮人身泥丸綘宫中理五氣混合百神十轉回靈萬氣齊仙知磬舉火鍊丹界天尊高功召火錬官將謹召丹天流火主者錬度真人火池使者火池童子火府神吏雷門忠孝陽雷苟元帥紫皇錬度一行官將吏兵引魂使者引導亡魂入火沼錬度務令業垢煙消𡨚尤燼滅濯形太陽再生人質一如紫皇玄天上帝符命疾速奉行侍職焚火鍊符于火沼內衆誦元始中篇高功默念南方之君赤帝之精熒𤏘使者丙丁將軍朱雀災神赫赫陽精五行造化萬物化生天帝有敕使者須聽攝亡召魂錬度身形高功以雙目熌動電光左乎剔午火呵氣入想火沼真木炎炎衆念炎精之神三台流光錬胎易質魄鍊魂更穢氣殂落乘煙飛楊隂氣消釋陽氣混康精神益壯洞入火鄊混合九氣總契虛皇昊天有敕流金散芒九天煥落貞利無疆想亡魂在火沼受煉六甲六乙錬汝肝經生汝威神體健身輕六丙六丁生汝心經錬汝神氣保汝長生六庚六辛生汝肺經大腸小腸萬氣潛明六壬六癸錬汝腎經華精盈池骨髓安寧六戊六巳錬汝脾經長生久視骨肉輕清錬身復形化體三清高功玉文青氣布亡魂衆念龍漢蕩蕩無形無名渺渺億劫黃道開明神澄朗曜九魂吐精玉虛澄暉太霞高明元始開化諸天齊并三元道氣二象攝生已度者度未成者成已死即生已枯使榮蠢動蜎息一切𡨋靈懷胎含孕咸得長生亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天神地祗及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至真尊神無窮無極普鑒度生地恨斷絶玄都紀答衆真普應一切咸聽高功直念火沼官吏錬度既周出火沼詣水池受鍊一如紫皇玄天上帝律令知磬舉黃華蕩形天尊高功召水錬官將謹召天河東井玉眸黃華大神煉度真人水池使者水池童子水府神吏雷門忠孝隂雷畢元帥紫皇錬度一行官將吏兵引魂使者引導亡魂入水池煉度務令業垢氷清𡨚汚蕩滌凝神太隂再生人質一如紫皇玄天上帝符命疾速奉行侍職焚水鍊符于水池內衆誦中篇高功默念北方之君黑帝之精辰星使者壬癸將軍玄武隂神肅肅淸音五行造化萬物發生天帝有敕使者須聽攝召亡魂灌鍊身形高功以鼻出氣化水入左手剔子文吹入想水池真水茫茫衆念東井黃華石景王精飛玄水母金體玉津滔滔源源不竭池庭九龍灌溉三光垂精仙人吐潤濯錬亡魂內外朗徹表裏俱清百關九竅元氣滋榮五臟六腑萬神自生胞胎結節隨水開扄死根斷滅𢙣根沉淪我今煉化死骸生魂𨑰故改貌玉體金容變化蕩穢飛升紫庭想亡魂在水池受煉衆念紫微黃書名曰太玄致月華水飬魄和魂身中飬素發身玄關藏天隱地五靈夫人飛光九道映朗泥丸黃氣隂華陽精錬仙沐浴九魂冠帶金晨圎明啓告玉胎錬仙華光交映流芳淘津九陽齊化玄和降津元景徘徊曲降我身飛升上宫洞視璦軒高功玉文中天青氣噓布亡魂又念龍漢蕩蕩無形無名渺渺億劫黃道開明神澄朗耀九魂吐精玉虛澄暉太霞高明元始開化諸天齊並三元道氣二象攝生巳度者度未成者成已死即生已枯即榮蠢動蜎息一切𡨋靈懷胎含孕咸得長生亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒映普告萬靈天神地祗及諸河源五嶽四瀆及諸名山洞玄洞虛洞空洞仙無極大聖至真尊神無窮無極普鑒度生地根斷絶玄都紀名衆真普應一切咸聽高功直念水池官吏錬度既周引領亡魂出水池伺侯生化一如紫皇玄天上帝律令知磬舉受錬更生天尊高功直念惟人之生有物混成乾道成男坤道成女帝君品命太乙執符司命定算太乙度符五帝監生九天稱慶司命敬諾敬順萬神唱奉恭天地神示三界偹守如此化結方能成人今日在壇受度亡過某魂曩因命過𨑰泉扄